{% extends "base.html" %}

{% block extra_title %}- Page Not Found{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <h2 class="mb-3">404 - Page not found</h2>
    <p class="lead">Sorry, we couldn't find the page you were looking for.</p>
    <p class="mb-4">Try going back to the homepage or browsing our products.</p>
    <a href="{% url 'home' %}" class="btn btn-warning mr-2">Go to Home</a>
    <a href="{% url 'products' %}" class="btn btn-outline-dark">Browse Products</a>
</div>
{% endblock %}
